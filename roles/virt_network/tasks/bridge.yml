---
- name: Configure bridge devices for virtual machines
  community.general.nmcli:
    autoconnect: true
    method4: "{{ item['method4'] | default('manual') }}"
    method6: "{{ item['method6'] | default('disabled') }}"
    autoconnect_priority: 999
    conn_name: "br-{{ item['name'] }}"
    conn_reload: true
    ifname: "br-{{ item['name'] }}"
    ip4: "{{ item['ip4'] | default(omit) }}"
    state: "{{ item['state'] | default('present') }}"
    stp: false
    type: bridge
    zone: "{{ item['zone'] | default('internal') }}"
  loop: "{{ virt_network_bridges }}"
  
