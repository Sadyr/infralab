---
- name: Ensure firewalld service is started and enabled
  ansible.builtin.systemd_service:
    name: firewalld
    state: started
    enabled: true

- name: Ensure masquerade is enabled on public zone
  ansible.posix.firewalld:
    immediate: true
    masquerade: true
    zone: public
    permanent: true
    state: enabled

- name: Ensure forwarding is enabled in internal zone
  ansible.posix.firewalld:
    immediate: true
    zone: internal
    permanent: true
    forward: true
    state: enabled

- name: Deploy firewalld policy
  ansible.builtin.template:
    src: internal-public.xml.j2
    dest: /etc/firewalld/policies/internal-public.xml
    owner: "root"
    group: "root"
    mode: "0644"
  notify:
    - firewalld reload

